services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - taskflow
    depends_on:
      - mysql
      - redis
  nginx:
    image: nginx:alpine
    container_name: taskflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskflow
    depends_on:
      - app
  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskflow
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - taskflow
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taskflow
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - taskflow
    depends_on:
      - mysql
      - redis
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: taskflow_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: taskflow
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    networks:
      - taskflow
    depends_on:
      - mysql
networks:
  taskflow:
    driver: bridge
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
